<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保险涉敏信息扫描工具</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>📄 保险涉敏信息扫描工具</h1>
    <p class="subtitle">上传 PDF、图片或 Word 文档，自动识别保险相关文件并提取涉敏人员信息</p>
  </header>

  <!-- 上传区域 -->
  <section class="upload-section">
    <div class="drop-zone" id="dropZone">
      <p class="drop-text">拖拽文件到此区域，或点击选择文件</p>
      <p class="drop-hint">支持 PDF、JPG、JPEG、PNG、Word(.docx) · 可一次选择多个文件</p>
      <input type="file" id="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png,.docx" hidden>
      <button class="btn" id="selectBtn">选择文件</button>
    </div>
    <div id="fileList" class="file-list"></div>
    <button class="btn btn-primary" id="uploadBtn" disabled>开始识别</button>
  </section>

  <!-- 进度指示 -->
  <section id="progressSection" class="progress-section" hidden>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <p id="progressText" class="progress-text">正在识别...</p>
  </section>

  <!-- 统计概览 -->
  <section id="statsSection" class="stats-section" hidden>
    <div class="stats-row">
      <div class="stats-card">
        <span class="stats-number" id="totalFiles">0</span>
        <span class="stats-label">总文件数</span>
      </div>
      <div class="stats-card stats-card-sensitive">
        <span class="stats-number" id="sensitiveFiles">0</span>
        <span class="stats-label">涉敏文件数</span>
      </div>
      <div class="stats-card stats-card-primary">
        <span class="stats-number" id="globalPersons">0</span>
        <span class="stats-label">涉敏人数（去重）</span>
      </div>
      <div class="stats-card stats-card-life">
        <span class="stats-number" id="lifeStats">0</span>
        <span class="stats-label" id="lifeStatsLabel">人身险涉敏</span>
      </div>
      <div class="stats-card stats-card-property">
        <span class="stats-number" id="propertyStats">0</span>
        <span class="stats-label" id="propertyStatsLabel">财产险文件</span>
      </div>
      <div class="stats-card stats-card-anomaly">
        <span class="stats-number" id="anomalyFiles">0</span>
        <span class="stats-label">异常文件</span>
      </div>
    </div>
  </section>

  <!-- 结果表格 -->
  <section id="resultSection" class="result-section" hidden>
    <div class="result-toolbar">
      <h2>识别结果</h2>
      <div class="toolbar-buttons">
        <button class="btn" id="exportExcelBtn">导出 Excel</button>
        <button class="btn" id="exportJsonBtn">导出 JSON</button>
        <button class="btn" id="clearBtn">清空</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table id="resultTable">
        <thead>
          <tr>
            <th>文件名</th>
            <th>文档类型</th>
            <th>险种类别</th>
            <th>险种大类</th>
            <th>保险公司</th>
            <th>异常标记</th>
            <th>涉敏人数</th>
            <th>涉敏人员</th>
            <th>详情</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
  </section>
</div>

<!-- 详情抽屉 -->
<div id="detailModal" class="drawer-overlay">
  <div class="drawer-panel">
    <div class="drawer-header">
      <span id="modalTitle">文件详情</span>
      <button class="drawer-close" id="modalCloseBtn">&times;</button>
    </div>
    <div class="drawer-body" id="modalBody"></div>
  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
